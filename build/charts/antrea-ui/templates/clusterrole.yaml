kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  # ClusterRole is cluster-scoped, so its name must be unique across all
  # antrea-ui releases in the cluster (e.g. running both frontend variants
  # side by side, each as its own release in its own namespace).
  name: {{ .Release.Name }}
  labels:
    app: antrea-ui
rules:
  - apiGroups:
      - crd.antrea.io
    resources:
      - antreacontrollerinfos
    verbs:
      - get
  - apiGroups:
      - crd.antrea.io
    resources:
      - antreaagentinfos
    verbs:
      - list
      - get
  - apiGroups:
      - crd.antrea.io
    resources:
      - traceflows
      - traceflows/status
    verbs:
      - get
      - list
      - watch
      - create
      - delete
  - apiGroups:
      - crd.antrea.io
    resources:
      - networkpolicies
      - clusternetworkpolicies
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - networking.k8s.io
    resources:
      - networkpolicies
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - watch
      - list
    resourceNames:
      - antrea-config
      - antrea-ca
  - nonResourceURLs:
      - /featuregates
    verbs:
      - get
