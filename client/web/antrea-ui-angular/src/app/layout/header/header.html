<header class="header header-6">
  <div class="branding">
    <a routerLink="/" class="nav-link">
      <img src="logo.svg" alt="Antrea logo" class="branding-icon" />
      <span class="title">Antrea UI</span>
    </a>
  </div>
  <div class="header-actions">
    <clr-dropdown>
      <button class="nav-icon-hitarea" clrDropdownTrigger aria-label="user menu">
        <cds-icon shape="user"></cds-icon>
      </button>
      <clr-dropdown-menu clrPosition="bottom-right" *clrIfOpen>
        <button clrDropdownItem type="button" (click)="logout()">
          <cds-icon shape="logout"></cds-icon>
          Logout
        </button>
      </clr-dropdown-menu>
    </clr-dropdown>
  </div>
</header>
